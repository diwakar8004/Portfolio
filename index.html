<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dhyanchand Gond — Neural Command Center</title>
    <meta name="description" content="Dhyanchand Gond — AI-assisted web developer. Initializing Neural Command Center..." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;500;600&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --void: #030308;
            --neon: #00ffaa;
            --cyan: #00e5ff;
            --magenta: #ff006e;
            --amber: #ffbe0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--void);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #c8d6e5;
            overflow: hidden;
            position: relative;
        }

        /* Scanlines */
        body::after {
            content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;
            background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,170,0.015) 2px,rgba(0,255,170,0.015) 4px);
        }

        /* Grid background */
        .grid-bg {
            position: absolute; inset: 0;
            background-image: linear-gradient(rgba(0,255,170,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0,255,170,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black, transparent);
            animation: gridDrift 25s linear infinite;
        }
        @keyframes gridDrift { to { transform: translate(60px, 60px); } }

        /* Morphing orbs */
        .orb{position:absolute;border-radius:50%;filter:blur(100px);pointer-events:none;}
        .orb-1{width:500px;height:500px;background:radial-gradient(circle,var(--neon),transparent 70%);top:-150px;left:-150px;opacity:0.08;animation:orbF1 20s ease-in-out infinite;}
        .orb-2{width:400px;height:400px;background:radial-gradient(circle,var(--cyan),transparent 70%);bottom:-100px;right:-100px;opacity:0.06;animation:orbF2 28s ease-in-out infinite;}
        .orb-3{width:300px;height:300px;background:radial-gradient(circle,var(--magenta),transparent 70%);top:40%;right:20%;opacity:0.05;animation:orbF3 22s ease-in-out infinite;}
        @keyframes orbF1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(100px,60px) scale(1.2)}}
        @keyframes orbF2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-80px,-60px) scale(1.15)}}
        @keyframes orbF3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-60px,40px) scale(0.9)}}

        /* Radar sweep */
        .radar {
            position: absolute;
            width: 400px; height: 400px;
            border-radius: 50%;
            border: 1px solid rgba(0,255,170,0.06);
            top: 50%; left: 50%; transform: translate(-50%,-50%);
        }
        .radar::before {
            content:''; position:absolute; inset:40px;
            border-radius:50%; border:1px solid rgba(0,255,170,0.04);
        }
        .radar::after {
            content:''; position:absolute; inset:0;
            border-radius:50%;
            background:conic-gradient(from 0deg, transparent 0deg, rgba(0,255,170,0.12) 40deg, transparent 80deg);
            animation: radarSpin 4s linear infinite;
        }
        @keyframes radarSpin { to { transform: rotate(360deg); } }

        /* Content */
        .loader-container {
            text-align: center;
            position: relative; z-index: 10;
            animation: fadeIn 0.8s ease;
        }

        .initials {
            width: 90px; height: 90px; margin: 0 auto 2rem;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--neon), var(--cyan));
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: 900; color: var(--void);
            font-family: 'Orbitron', sans-serif;
            box-shadow: 0 0 40px rgba(0,255,170,0.4), 0 0 80px rgba(0,255,170,0.15);
            animation: breathe 2.5s ease-in-out infinite;
            position: relative;
        }
        .initials::after {
            content:''; position:absolute; inset:-4px;
            border-radius:20px; border:1px solid rgba(0,255,170,0.3);
            animation: breathe 2.5s ease-in-out infinite reverse;
        }
        @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }

        .brand-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem; font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--neon), var(--cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 20px rgba(0,255,170,0.3));
        }

        .loading-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem; color: #5a6a7a;
            margin-bottom: 2rem;
            letter-spacing: 2px;
        }
        .loading-text span {
            color: var(--neon);
            animation: blink 1s step-end infinite;
        }
        @keyframes blink { 0%,50%{opacity:1}51%,100%{opacity:0} }

        /* Typing terminal log */
        .terminal-log {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: #5a6a7a;
            margin-bottom: 2rem;
            text-align: left;
            max-width: 320px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.8;
        }
        .terminal-log .log-line {
            opacity: 0;
            animation: logFade 0.3s ease forwards;
        }
        .terminal-log .log-line .ok { color: var(--neon); }
        .terminal-log .log-line .warn { color: var(--amber); }

        /* Progress bar */
        .progress-track {
            width: 240px; height: 2px;
            background: rgba(0,255,170,0.06);
            border-radius: 2px;
            overflow: hidden;
            margin: 0 auto;
            position: relative;
        }
        .progress-fill {
            width: 0; height: 100%;
            background: linear-gradient(90deg, var(--neon), var(--cyan));
            border-radius: 2px;
            animation: fillBar 2.2s ease forwards;
            box-shadow: 0 0 12px var(--neon);
        }
        .progress-pct {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            color: var(--neon);
            margin-top: 0.5rem;
            letter-spacing: 2px;
        }

        @keyframes fillBar { to { width: 100%; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes logFade { to { opacity: 1; } }

        /* Floating particles */
        .particle {
            position: absolute;
            width: 2px; height: 2px;
            border-radius: 50%;
            background: var(--neon);
            opacity: 0;
            pointer-events: none;
            animation: particleFloat linear infinite;
        }
        @keyframes particleFloat {
            0% { opacity:0; transform: translateY(0); }
            10% { opacity:0.6; }
            90% { opacity:0.6; }
            100% { opacity:0; transform: translateY(-100vh); }
        }

        @media (max-width: 768px) {
            .radar {
                width: 280px;
                height: 280px;
            }

            .brand-name {
                font-size: 1.2rem;
                letter-spacing: 2px;
            }

            .loading-text {
                font-size: 0.72rem;
                letter-spacing: 1px;
                margin-bottom: 1.25rem;
            }

            .terminal-log {
                max-width: 90vw;
                font-size: 0.58rem;
                line-height: 1.6;
            }

            .progress-track {
                width: 80vw;
                max-width: 240px;
            }
        }

        @media (max-width: 480px) {
            .initials {
                width: 74px;
                height: 74px;
                font-size: 1.6rem;
            }

            .brand-name {
                font-size: 1rem;
            }

            .orb-1,
            .orb-2,
            .orb-3 {
                filter: blur(80px);
            }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="radar"></div>

    <div class="loader-container">
        <div class="initials">DG</div>
        <div class="brand-name">Dhyanchand Gond</div>
        <div class="loading-text">&gt;_ Initializing Neural Systems<span>_</span></div>

        <div class="terminal-log" id="termLog"></div>

        <div class="progress-track">
            <div class="progress-fill"></div>
        </div>
        <div class="progress-pct" id="pctDisplay">0%</div>
    </div>

    <script>
        // Terminal log lines
        const logLines = [
            ['Loading neural cores...', 'ok'],
            ['Establishing secure channel...', 'ok'],
            ['Decrypting classified assets...', 'ok'],
            ['Compiling dossier fragments...', 'warn'],
            ['Activating command center...', 'ok'],
        ];

        const logEl = document.getElementById('termLog');
        logLines.forEach((line, i) => {
            setTimeout(() => {
                const div = document.createElement('div');
                div.className = 'log-line';
                div.style.animationDelay = '0s';
                div.innerHTML = `<span class="${line[1]}">[${line[1].toUpperCase()}]</span> ${line[0]}`;
                logEl.appendChild(div);
            }, 300 + i * 350);
        });

        // Percent counter
        const pctEl = document.getElementById('pctDisplay');
        let pct = 0;
        const pctTimer = setInterval(() => {
            pct = Math.min(pct + Math.random() * 8, 100);
            pctEl.textContent = Math.floor(pct) + '%';
            if (pct >= 100) {
                clearInterval(pctTimer);
                pctEl.textContent = '100% — ENTERING';
            }
        }, 50);

        // Floating particles
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.bottom = '-10px';
            p.style.animationDuration = (4 + Math.random() * 6) + 's';
            p.style.animationDelay = Math.random() * 4 + 's';
            p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
            if (Math.random() > 0.6) p.style.background = 'var(--cyan)';
            document.body.appendChild(p);
        }

        // Redirect
        setTimeout(function() {
            window.location.href = 'pages/hero_laboratory.html';
        }, 2800);
    </script>
</body>
</html>
