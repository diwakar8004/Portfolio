<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dhyanchand Gond — Portfolio</title>
    <meta name="description" content="Dhyanchand Gond — Full-Stack Developer from Lucknow, India. TypeScript · Next.js · Tailwind · Redux" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #e4e4e7;
            overflow: hidden;
        }
        /* Backgrounds */
        body::before {
            content: '';
            position: absolute; inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 50% 50%, rgba(99,102,241,0.12), transparent),
                radial-gradient(ellipse 40% 30% at 80% 80%, rgba(168,85,247,0.08), transparent);
        }
        .loader-container {
            text-align: center;
            position: relative; z-index: 2;
            animation: fadeIn 0.6s ease;
        }
        .initials {
            width: 80px; height: 80px; margin: 0 auto 1.5rem;
            border-radius: 20px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: 800; color: #fff;
            box-shadow: 0 12px 40px rgba(99,102,241,0.35);
            animation: breathe 2s ease-in-out infinite;
        }
        @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .brand-name {
            font-size: 1.75rem; font-weight: 800; margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #e4e4e7, #c084fc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .loading-text {
            font-size: 0.95rem; color: #71717a; margin-bottom: 2rem;
        }
        /* Progress bar */
        .progress-track {
            width: 200px; height: 3px; background: rgba(255,255,255,0.06);
            border-radius: 2px; overflow: hidden; margin: 0 auto;
        }
        .progress-fill {
            width: 0; height: 100%;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            border-radius: 2px;
            animation: fillBar 1.8s ease forwards;
        }
        @keyframes fillBar { to { width: 100%; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="loader-container">
        <div class="initials">DG</div>
        <div class="brand-name">Dhyanchand Gond</div>
        <div class="loading-text">Loading portfolio…</div>
        <div class="progress-track">
            <div class="progress-fill"></div>
        </div>
    </div>

    <script>
        setTimeout(function() {
            window.location.href = 'pages/hero_laboratory.html';
        }, 2000);
    </script>
</body>
</html>
